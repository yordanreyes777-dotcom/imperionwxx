<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ImperionWxx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      font-family: 'Poppins', sans-serif;
    }

    .card {
      background: white;
      padding: 40px 25px;
      border-radius: 25px;
      text-align: center;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .logo {
      width: 75px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0f172a;
    }

    p {
      font-size: 14px;
      color: #475569;
      margin-bottom: 25px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #0088cc;
      color: white;
      padding: 14px 20px;
      font-size: 14px;
      text-decoration: none;
      border-radius: 12px;
      margin: 0 auto;
      width: 80%;
    }

    .btn img {
      width: 20px;
      height: 20px;
    }

    .lang-btn {
      margin-top: 15px;
      font-size: 12px;
      background: none;
      border: none;
      color: #2563eb;
    }
  </style>
</head>

<body>

  <div class="card">

    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/5968/5968804.png">

    <h1 id="title">PREMIUM ACCESS</h1>
    <p id="desc">Join our official channel and unlock exclusive content</p>

    <a class="btn" href="https://t.me/imperionWxx" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
      <span id="btnText">Open Telegram</span>
    </a>

    <button class="lang-btn" onclick="toggleLang()">Español</button>

  </div>

  <script>
    let isEnglish = true;

    function toggleLang() {
      const title = document.getElementById("title");
      const desc = document.getElementById("desc");
      const btnText = document.getElementById("btnText");

      if (isEnglish) {
        title.innerText = "ACCESO PREMIUM";
        desc.innerText = "Únete a nuestro canal oficial y desbloquea contenido exclusivo";
        btnText.innerText = "Abrir Telegram";
      } else {
        title.innerText = "PREMIUM ACCESS";
        desc.innerText = "Join our official channel and unlock exclusive content";
        btnText.innerText = "Open Telegram";
      }

      isEnglish = !isEnglish;
    }
  </script>

</body>
</html>
