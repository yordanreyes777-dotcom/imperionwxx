<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ImperionWxx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      animation: fadeIn 1s ease;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .counter {
      font-size: 18px;
      margin-bottom: 25px;
      font-weight: bold;
      color: #e0f2fe;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #0088cc;
      color: white;
      padding: 22px 45px;
      font-size: 20px;
      text-decoration: none;
      border-radius: 15px;
      position: relative;
      z-index: 1;
      transition: 0.3s;
    }

    .btn img {
      width: 26px;
      height: 26px;
    }

    /* Glow animado */
    .btn::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 18px;
      background: linear-gradient(45deg, #00e0ff, #0077ff, #00e0ff);
      z-index: -1;
      filter: blur(10px);
      animation: glow 3s linear infinite;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    @keyframes glow {
      0% { filter: blur(10px) hue-rotate(0deg); }
      100% { filter: blur(10px) hue-rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🔥 Únete ahora 🔥</h1>
    <p>Contenido exclusivo todos los días</p>

    <div class="counter">
      👥 Usuarios conectados: <span id="count">120</span>
    </div>

    <a class="btn" href="https://t.me/imperionWxx" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
      Entrar a Telegram
    </a>
  </div>

  <script>
    // Contador animado falso
    let count = 120;
    setInterval(() => {
      count += Math.floor(Math.random() * 3);
      document.getElementById("count").innerText = count;
    }, 2000);
  </script>

</body>
</html>
