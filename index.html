<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ImperionWxx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      font-family: 'Poppins', sans-serif;
    }

    .card {
      background: white;
      padding: 40px 25px;
      border-radius: 25px;
      text-align: center;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    .logo {
      width: 75px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0f172a;
      letter-spacing: 1px;
    }

    p {
      font-size: 14px;
      color: #475569;
      margin-bottom: 25px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #0088cc;
      color: white;
      padding: 14px 20px;
      font-size: 14px;
      text-decoration: none;
      border-radius: 12px;
      margin: 0 auto;
      width: 80%;
    }

    .btn img {
      width: 20px;
      height: 20px;
    }

    .lang-btn {
      margin-top: 15px;
      font-size: 12px;
      background: none;
      border: none;
      color: #2563eb;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head
