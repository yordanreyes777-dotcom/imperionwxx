<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ImperionWxx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      font-family: 'Poppins', sans-serif;
    }

    .card {
      background: white;
      padding: 25px 20px;
      border-radius: 20px;
      text-align: center;
      width: 80%;
      max-width: 260px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #0088cc;
      color: white;
      padding: 12px 15px;
      font-size: 14px;
      text-decoration: none;
      border-radius: 12px;
      margin: 0 auto;
      width: 100%;
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    .lang-btn {
      margin-top: 12px;
      font-size: 12px;
      background: none;
      border: none;
      color: #2563eb;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="card">

    <a class="btn" href="https://t.me/imperionWxx" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
      <span id="btnText">Open Telegram</span>
    </a>

    <button class="lang-btn" onclick="toggleLang()">Español</button>

  </div>

  <script>
    let isEnglish = true;

    function toggleLang() {
      const btnText = document.getElementById("btnText");

      if (isEnglish) {
        btnText.innerText = "Abrir Telegram";
      } else {
        btnText.innerText = "Open Telegram";
      }

      isEnglish = !isEnglish;
    }
  </script>

</body>
</html>
